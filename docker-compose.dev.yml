services:
  kuzu-app:
    build:
      context: .
      target: dev
    container_name: kuzu-app
    restart: unless-stopped
    ports:
      - "3333:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@kuzu-db:5432/${POSTGRES_DB}"
    depends_on:
      - kuzu-db
    networks:
      - kuzu-network

  kuzu-db:
    image: postgres:15
    container_name: kuzu-db
    restart: unless-stopped
    ports:
      - "5678:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - kuzu-network

volumes:
  pgdata:

networks:
  kuzu-network:
    external: true
